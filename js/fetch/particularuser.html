<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: black;
        color: white;
        font-family: "Times New Roman", Times, serif;
      }
      #main {
        margin: 20px;
        background: darkslategray;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      form {
        padding: 20px;
      }
      input {
        padding: 10px;
      }
      button {
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <form id="mainContainer">
        <input type="number" id="userIdInput" value="1" min="1" max="10" />
        <button onclick="handleclick(event)">Search</button>
      </form>
    </div>

    <div id="output"></div>
    <script>
        const fetchData =async (userIdInput)=>{
            const output = document.getElementById("output")
            const data = await fetch(`https://jsonplaceholder.typicode.com/users/${userIdInput}`);
            const response =await data.json();
            console.log(response)
            output.innerHTML = `
            ${response.name}
            `
        }

        const handleclick = (e)=>{
            e.preventDefault()
            const  userIdInput = document.getElementById("userIdInput").value;
            fetchData(userIdInput)
        }
    </script>
  </body>
</html>
