<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* From Uiverse.io by eslam-hany */
      .input-container {
        position: relative;
      }

      .input {
        padding: 10px;
        height: 40px;
        border: 2px solid #0b2447;
        border-top: none;
        border-bottom: none;
        font-size: 16px;
        background: transparent;
        outline: none;
        box-shadow: 7px 7px 0px 0px #0b2447;
        transition: all 0.5s;
      }

      .input:focus {
        box-shadow: none;
        transition: all 0.5s;
      }

      .label {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #0b2447;
        transition: all 0.5s;
        transform: scale(0);
        z-index: -1;
      }

      .input-container .topline {
        position: absolute;
        content: "";
        background-color: #0b2447;
        width: 0%;
        height: 2px;
        right: 0;
        top: 0;
        transition: all 0.5s;
      }

      .input-container input[type="text"]:focus ~ .topline {
        width: 35%;
        transition: all 0.5s;
      }

      .input-container .underline {
        position: absolute;
        content: "";
        background-color: #0b2447;
        width: 0%;
        height: 2px;
        right: 0;
        bottom: 0;
        transition: all 0.5s;
      }

      .input-container input[type="text"]:focus ~ .underline {
        width: 100%;
        transition: all 0.5s;
      }

      .input-container input[type="text"]:focus ~ .label {
        top: -10px;
        transform: scale(1);
        transition: all 0.5s;
      }
    </style>
  </head>
  <body>
    <!-- From Uiverse.io by eslam-hany -->
    <div class="input-container">
      <input class="input" id="userPassword" name="text" type="text" />
      <label class="label" for="password">Enter Your password</label>
      <div class="topline"></div>
      <div class="underline"></div>
    </div>
    <p id="passwordHint"></p>

    <script>
      const passwordInput = document.getElementById("userPassword");
      const hint = document.getElementById("passwordHint");

      passwordInput.addEventListener("input", () => {
        const pass = passwordInput.value;

        if (pass.length < 8) {
          hint.textContent = "Too short! (Need 8+ letters)";
          hint.style.color = "red";
        } else if (!/[A-Z]/.test(pass)) {
          hint.textContent = "Add a CAPITAL letter!";
          hint.style.color = "yellow";
        } else if (!/[a-z]/.test(pass)) {
          hint.textContent = "Add a small letter!";
          hint.style.color = "orange";
        } else if (!/[0-9]/.test(pass)) {
          hint.textContent = "Add a number letter!";
          hint.style.color = "lightgreen";
        } else {
          hint.textContent = "Perfect!";
          hint.style.color = "green";
        }
      });
    </script>
  </body>
</html>
