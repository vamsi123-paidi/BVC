<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-size: cover;
            background-image: url('../images/bgimg/blue-circle-with-white-user_78370-4707.avif');
        }
        #center{
            position: absolute;
            top: 50%;
            right: 50%;
            padding-left: 50px;
            color: darkolivegreen;
        }
        h1{
            padding-left: 70px;
            font-weight: 500;
            font-size: 38px;
        }
        input{
            padding-left: 70px;
            padding: 10px;
            border-radius: 8px;
        }
        button{
            background: darkblue;
            color: aqua;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;

        }
        button:hover{
            background: lightblue;
            color: darkcyan;
        }
    </style>
</head>
<body>
    <div id="center">
        <h1>GOOGLE</h1><br>
        <input type="text">
        <button>Submit</button>
    </div>
</body>
</html>
