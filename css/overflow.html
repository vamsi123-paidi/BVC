<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            border: 2px solid black;
            height: 100px;
            width: 100px;
            overflow: scroll;
        }
        button{
            background: darkblue;
            color: lightblue;
            cursor: pointer;
        }
        button:hover{
            background: lightblue;
            color: darkblue;
            transition: background 5s;
            transition: color 5s;
        }
    </style>
</head>
<body>
    <div id="container">
        <p>Lorem ipsum </p>
        <button>Submit</button>
    </div>
</body>
</html>
